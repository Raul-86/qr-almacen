<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="QR Almacén" />
    <meta name="description" content="Generador y lector de códigos QR cifrados con AES-256-GCM" />
    <title>QR Almacén Seguro</title>
    <link rel="manifest" href="manifest.json" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
    <style>
      body { margin: 0; background: #f9fafb; }
      html, body { overscroll-behavior: none; }
      .safe-top    { padding-top:    env(safe-area-inset-top); }
      .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
    </style>
  </head>
  <body class="safe-top safe-bottom">
    <div id="root"></div>
    <script type="text/babel">

const { useState, useEffect, useRef, useCallback } = React;

// ── AES-256-GCM ───────────────────────────────────────────────────────────────
const enc = new TextEncoder(), dec = new TextDecoder();
async function deriveKey(password, salt) {
  const km = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name:'PBKDF2', salt, iterations:310000, hash:'SHA-256' },
    km, { name:'AES-GCM', length:256 }, false, ['encrypt','decrypt']
  );
}
async function encryptData(plaintext, password) {
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iv   = crypto.getRandomValues(new Uint8Array(12));
  const key  = await deriveKey(password, salt);
  const cb   = await crypto.subtle.encrypt({ name:'AES-GCM', iv }, key, enc.encode(plaintext));
  const packed = new Uint8Array(16+12+cb.byteLength);
  packed.set(salt,0); packed.set(iv,16); packed.set(new Uint8Array(cb),28);
  return btoa(String.fromCharCode(...packed)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}
async function decryptData(b64url, password) {
  const b64    = b64url.replace(/-/g,'+').replace(/_/g,'/');
  const packed = Uint8Array.from(atob(b64), c=>c.charCodeAt(0));
  const key    = await deriveKey(password, packed.slice(0,16));
  const plain  = await crypto.subtle.decrypt({ name:'AES-GCM', iv:packed.slice(16,28) }, key, packed.slice(28));
  return dec.decode(plain);
}

// ── UI helpers ────────────────────────────────────────────────────────────────
const inp = "w-full px-3 py-2.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent text-sm transition-all bg-white";
const lbl = "block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1";

function PasswordInput({ value, onChange, placeholder, autoFocus }) {
  const [show, setShow] = useState(false);
  return (
    <div className="relative">
      <input autoFocus={autoFocus} type={show?'text':'password'} value={value} onChange={onChange}
        placeholder={placeholder||'Contraseña de cifrado'} className={inp+' pr-10'} />
      <button type="button" onClick={()=>setShow(p=>!p)}
        className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
        {show ? '🙈' : '👁️'}
      </button>
    </div>
  );
}

function PasswordModal({ payload, onConfirm, onCancel }) {
  const [pass, setPass] = useState('');
  const [err, setErr]   = useState('');
  const [busy, setBusy] = useState(false);
  const handleConfirm = async () => {
    if (!pass) { setErr('Introduce la contraseña.'); return; }
    setBusy(true); setErr('');
    try {
      const raw = payload.replace(/^QR-AES256GCM:/,'');
      const plain = await decryptData(raw, pass.trim());
      onConfirm(plain);
    } catch { setErr('Contraseña incorrecta o datos corruptos.'); }
    setBusy(false);
  };
  return (
    <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4">
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6 space-y-4">
        <div className="flex items-center gap-3">
          <div className="w-10 h-10 bg-indigo-100 rounded-xl flex items-center justify-center text-xl">🔒</div>
          <div>
            <h3 className="font-semibold text-gray-900">Contenido cifrado</h3>
            <p className="text-xs text-gray-500">Introduce la clave para ver los datos</p>
          </div>
        </div>
        <PasswordInput autoFocus value={pass} onChange={e=>setPass(e.target.value)} placeholder="Contraseña de cifrado"/>
        <div className="bg-gray-100 rounded-lg px-3 py-2 text-xs text-gray-500 font-mono break-all">
          Caracteres: {pass.length} | Hex: {Array.from(pass).map(c=>c.charCodeAt(0).toString(16)).join(' ')}
        </div>
        {err && <p className="text-sm text-red-500 bg-red-50 rounded-lg px-3 py-2">{err}</p>}
        <div className="flex gap-3">
          <button onClick={onCancel} className="flex-1 py-2.5 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 text-sm font-medium">Cancelar</button>
          <button onClick={handleConfirm} disabled={busy}
            className="flex-1 py-2.5 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 disabled:opacity-50 text-sm font-medium flex items-center justify-center gap-2">
            {busy ? '⏳' : '🔓'} {busy ? 'Descifrando…' : 'Descifrar'}
          </button>
        </div>
      </div>
    </div>
  );
}

function ResultCard({ text, onClose }) {
  const [copied, setCopied] = useState(false);
  const copy = async () => { await navigator.clipboard.writeText(text); setCopied(true); setTimeout(()=>setCopied(false),2000); };
  return (
    <div className="bg-green-50 border border-green-200 rounded-xl p-4 space-y-3">
      <div className="flex items-center justify-between">
        <div className="flex items-center gap-2">
          <span className="text-green-600">✅</span>
          <span className="text-sm font-semibold text-green-700">Datos descifrados correctamente</span>
        </div>
        <button onClick={onClose} className="text-gray-400 hover:text-gray-600">✕</button>
      </div>
      <pre className="text-sm text-gray-700 whitespace-pre-wrap break-words font-mono bg-white rounded-lg p-3 border border-green-100 max-h-60 overflow-y-auto">{text}</pre>
      <button onClick={copy} className="flex items-center gap-2 px-3 py-2 bg-white border border-green-200 rounded-lg text-sm text-green-700 hover:bg-green-50">
        {copied ? '✅ Copiado' : '📋 Copiar datos'}
      </button>
    </div>
  );
}

function ReaderTab() {
  const [mode, setMode]         = useState('camera');
  const [modal, setModal]       = useState(null);
  const [result, setResult]     = useState(null);
  const [error, setError]       = useState('');
  const [scanning, setScanning] = useState(false);
  const [cameraErr, setCameraErr] = useState('');
  const [payloadText, setPayloadText] = useState('');
  const videoRef  = useRef(null);
  const canvasRef = useRef(null);
  const streamRef = useRef(null);
  const rafRef    = useRef(null);

  useEffect(() => {
    if (!window.jsQR) {
      const s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js';
      document.head.appendChild(s);
    }
  }, []);

  const stopCamera = useCallback(() => {
    cancelAnimationFrame(rafRef.current);
    streamRef.current?.getTracks().forEach(t=>t.stop());
    streamRef.current = null;
    setScanning(false);
  }, []);

  useEffect(() => () => stopCamera(), [stopCamera]);

  const handleDetected = (raw) => {
    setError('');
    // Limpieza agresiva: quita espacios, saltos de línea y caracteres invisibles
    const cleaned = raw.trim().replace(/\s+/g, '').replace(/[^\x20-\x7E]/g, '');
    if (!cleaned.startsWith('QR-AES256GCM:')) { setError('Este QR no fue generado con este sistema.'); return; }
    setModal(cleaned);
  };

  const startCamera = async () => {
    setCameraErr(''); setResult(null); setError('');
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode:'environment' } });
      streamRef.current = stream;
      if (videoRef.current) {
        videoRef.current.srcObject = stream;
        await videoRef.current.play();
        setScanning(true);
        const tick = () => {
          const video = videoRef.current, canvas = canvasRef.current;
          if (!video || !canvas || video.readyState < 2) { rafRef.current = requestAnimationFrame(tick); return; }
          canvas.width = video.videoWidth; canvas.height = video.videoHeight;
          canvas.getContext('2d').drawImage(video,0,0);
          const img = canvas.getContext('2d').getImageData(0,0,canvas.width,canvas.height);
          if (window.jsQR) {
            const code = window.jsQR(img.data, img.width, img.height, { inversionAttempts:'dontInvert' });
            if (code?.data) { stopCamera(); handleDetected(code.data); return; }
          }
          rafRef.current = requestAnimationFrame(tick);
        };
        rafRef.current = requestAnimationFrame(tick);
      }
    } catch { setCameraErr('No se pudo acceder a la cámara. Usa "Imagen" o "Payload".'); }
  };

  const handleImageFile = (file) => {
    if (!file) return;
    setResult(null); setError('');
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = img.width; canvas.height = img.height;
        canvas.getContext('2d').drawImage(img,0,0);
        const imgData = canvas.getContext('2d').getImageData(0,0,img.width,img.height);
        const tryDecode = () => {
          const code = window.jsQR?.(imgData.data, imgData.width, imgData.height, { inversionAttempts:'dontInvert' });
          if (code?.data) handleDetected(code.data);
          else setError('No se detectó ningún QR en la imagen.');
        };
        window.jsQR ? tryDecode() : setTimeout(tryDecode, 800);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  };

  const handlePayloadDecode = () => {
    const raw = payloadText.trim().replace(/\s+/g, '').replace(/[^\x20-\x7E]/g, '');
    if (!raw) { setError('Pega un payload primero.'); return; }
    handleDetected(raw.startsWith('QR-AES256GCM:') ? raw : 'QR-AES256GCM:'+raw);
  };

  const switchMode = (m) => { stopCamera(); setMode(m); setResult(null); setError(''); setCameraErr(''); };

  return (
    <div className="space-y-4">
      {modal && <PasswordModal payload={modal} onConfirm={plain=>{setModal(null);setResult(plain);}} onCancel={()=>setModal(null)}/>}
      <div className="flex rounded-xl overflow-hidden border border-gray-200 bg-gray-50">
        {[['camera','📷 Cámara'],['image','🖼️ Imagen'],['payload','⌨️ Payload']].map(([id,label])=>(
          <button key={id} onClick={()=>switchMode(id)}
            className={`flex-1 py-3 text-sm font-medium transition-all ${mode===id?'bg-indigo-600 text-white':'text-gray-500 hover:text-gray-700'}`}>
            {label}
          </button>
        ))}
      </div>

      {mode==='camera' && (
        <div className="space-y-3">
          <div className="relative bg-black rounded-xl overflow-hidden aspect-video flex items-center justify-center min-h-48">
            <video ref={videoRef} muted playsInline className="w-full h-full object-cover"/>
            <canvas ref={canvasRef} className="hidden"/>
            {!scanning && !cameraErr && <div className="absolute inset-0 flex flex-col items-center justify-center gap-2"><div className="text-5xl">📷</div><p className="text-white/50 text-sm">Cámara inactiva</p></div>}
            {scanning && (
              <div className="absolute inset-0 pointer-events-none flex items-center justify-center">
                <div className="w-48 h-48 relative border-2 border-indigo-400 rounded-xl">
                  <span className="absolute top-0 left-0 w-7 h-7 border-t-4 border-l-4 border-indigo-400 rounded-tl-lg"/>
                  <span className="absolute top-0 right-0 w-7 h-7 border-t-4 border-r-4 border-indigo-400 rounded-tr-lg"/>
                  <span className="absolute bottom-0 left-0 w-7 h-7 border-b-4 border-l-4 border-indigo-400 rounded-bl-lg"/>
                  <span className="absolute bottom-0 right-0 w-7 h-7 border-b-4 border-r-4 border-indigo-400 rounded-br-lg"/>
                </div>
              </div>
            )}
          </div>
          {cameraErr && <p className="text-sm text-red-500 bg-red-50 rounded-lg p-3">{cameraErr}</p>}
          {!scanning
            ? <button onClick={startCamera} className="w-full flex items-center justify-center gap-2 py-3 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 text-sm font-medium">📷 Iniciar cámara</button>
            : <button onClick={stopCamera} className="w-full flex items-center justify-center gap-2 py-3 bg-red-500 text-white rounded-lg hover:bg-red-600 text-sm font-medium">✕ Detener cámara</button>
          }
        </div>
      )}

      {mode==='image' && (
        <label className="flex flex-col items-center justify-center w-full h-44 border-2 border-dashed border-gray-300 rounded-xl cursor-pointer hover:border-indigo-400 hover:bg-indigo-50 transition-all">
          <div className="text-4xl mb-2">🖼️</div>
          <span className="text-sm text-gray-500 font-medium">Haz clic o arrastra una imagen con QR</span>
          <span className="text-xs text-gray-400 mt-1">PNG, JPG, WEBP</span>
          <input type="file" accept="image/*" className="hidden" onChange={e=>handleImageFile(e.target.files?.[0])}/>
        </label>
      )}

      {mode==='payload' && (
        <div className="space-y-3">
          <div>
            <label className={lbl}>Payload del QR cifrado</label>
            <textarea className={inp+' font-mono'} rows={4} placeholder="QR-AES256GCM:…" value={payloadText} onChange={e=>setPayloadText(e.target.value)}/>
          <div className="bg-gray-100 rounded-lg px-3 py-2 text-xs text-gray-500 font-mono break-all">
            Longitud: {payloadText.trim().length} | Empieza con: "{payloadText.trim().substring(0,20)}"
          </div>
          </div>
          <button onClick={handlePayloadDecode} disabled={!payloadText}
            className="w-full flex items-center justify-center gap-2 py-3 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 disabled:opacity-40 text-sm font-medium">
            🔒 Introducir contraseña y descifrar
          </button>
        </div>
      )}

      {error && <div className="flex items-center gap-2 bg-red-50 border border-red-200 rounded-xl p-3"><span>🛡️</span><p className="text-sm text-red-600">{error}</p></div>}
      {result && <ResultCard text={result} onClose={()=>setResult(null)}/>}
    </div>
  );
}

function GeneratorTab() {
  const [activeTab, setActiveTab]   = useState('location');
  const [qrData, setQrData]         = useState('');
  const [copied, setCopied]         = useState(false);
  const [password, setPassword]     = useState('');
  const [encrypting, setEncrypting] = useState(false);
  const [encError, setEncError]     = useState('');
  const qrContainerRef = useRef(null);
  const debounceRef    = useRef(null);
  const [urlInput, setUrlInput]         = useState('');
  const [textInput, setTextInput]       = useState('');
  const [contactInfo, setContactInfo]   = useState({ firstName:'', lastName:'', phone:'', email:'', organization:'', url:'' });
  const [locationInfo, setLocationInfo] = useState({ zona:'', pasillo:'', estante:'', nivel:'', descripcion:'' });
  const [productInfo, setProductInfo]   = useState({ codigo:'', nombre:'', referencia:'', lote:'', cantidad:'', unidad:'', ubicacion:'', notas:'' });

  const formatUrl = u => !u.trim() ? '' : (!u.startsWith('http') ? 'https://'+u : u);
  const generateVCard = c => `BEGIN:VCARD\nVERSION:3.0\nFN:${c.firstName} ${c.lastName}\nN:${c.lastName};${c.firstName};;;\nORG:${c.organization}\nTEL:${c.phone}\nEMAIL:${c.email}\nURL:${c.url}\nEND:VCARD`;
  const generateLocationRaw = l => {
    const lines = ['=== UBICACIÓN DE ALMACÉN ==='];
    if(l.zona) lines.push(`ZONA: ${l.zona}`);
    if(l.pasillo) lines.push(`PASILLO: ${l.pasillo}`);
    if(l.estante) lines.push(`ESTANTE: ${l.estante}`);
    if(l.nivel) lines.push(`NIVEL: ${l.nivel}`);
    if(l.descripcion) lines.push(`DESCRIPCIÓN: ${l.descripcion}`);
    lines.push(`ID: ${[l.zona,l.pasillo,l.estante,l.nivel].filter(Boolean).join('-')}`);
    return lines.join('\n');
  };
  const generateProductRaw = p => {
    const lines = ['=== FICHA DE PRODUCTO ==='];
    if(p.codigo) lines.push(`CÓDIGO: ${p.codigo}`);
    if(p.nombre) lines.push(`NOMBRE: ${p.nombre}`);
    if(p.referencia) lines.push(`REFERENCIA: ${p.referencia}`);
    if(p.lote) lines.push(`LOTE: ${p.lote}`);
    if(p.cantidad) lines.push(`CANTIDAD: ${p.cantidad}${p.unidad?' '+p.unidad:''}`);
    if(p.ubicacion) lines.push(`UBICACIÓN: ${p.ubicacion}`);
    if(p.notas) lines.push(`NOTAS: ${p.notas}`);
    return lines.join('\n');
  };
  const getRawData = () => {
    if(activeTab==='url') return formatUrl(urlInput);
    if(activeTab==='text') return textInput;
    if(activeTab==='contact') return (contactInfo.firstName||contactInfo.email) ? generateVCard(contactInfo) : '';
    if(activeTab==='location') return (locationInfo.zona||locationInfo.pasillo||locationInfo.estante) ? generateLocationRaw(locationInfo) : '';
    if(activeTab==='product') return (productInfo.codigo||productInfo.nombre) ? generateProductRaw(productInfo) : '';
    return '';
  };

  const renderQR = text => {
    if(!qrContainerRef.current) return;
    if(!text){ qrContainerRef.current.innerHTML=''; return; }
    const doRender = () => {
      qrContainerRef.current.innerHTML='';
      const canvas=document.createElement('canvas');
      qrContainerRef.current.appendChild(canvas);
      new window.QRious({element:canvas,value:text,size:260,background:'white',foreground:'#1e1b4b',level:'M'});
      canvas.style.cssText='max-width:260px;width:100%;height:auto;border-radius:8px;';
    };
    if(!window.QRious){
      const s=document.createElement('script');
      s.src='https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js';
      s.onload=doRender; document.head.appendChild(s);
    } else doRender();
  };

  useEffect(()=>{
    clearTimeout(debounceRef.current);
    debounceRef.current=setTimeout(async()=>{
      setEncError('');
      const raw=getRawData();
      if(!raw||!password||password.trim().length<6){ setQrData(''); renderQR(''); return; }
      setEncrypting(true);
      try {
        const cipher=await encryptData(raw, password.trim());
        const payload=`QR-AES256GCM:${cipher}`;
        setQrData(payload); renderQR(payload);
      } catch { setEncError('Error al cifrar.'); }
      finally { setEncrypting(false); }
    },400);
  },[activeTab,urlInput,textInput,contactInfo,locationInfo,productInfo,password]);

  const downloadQR=()=>{
    const canvas=qrContainerRef.current?.querySelector('canvas');
    if(canvas){const a=document.createElement('a');a.download=`qr-enc-${activeTab}-${Date.now()}.png`;a.href=canvas.toDataURL();a.click();}
  };
  const copyPayload=async()=>{ if(qrData){await navigator.clipboard.writeText(qrData);setCopied(true);setTimeout(()=>setCopied(false),2000);} };
  const resetForm=()=>{
    setUrlInput('');setTextInput('');
    setContactInfo({firstName:'',lastName:'',phone:'',email:'',organization:'',url:''});
    setLocationInfo({zona:'',pasillo:'',estante:'',nivel:'',descripcion:''});
    setProductInfo({codigo:'',nombre:'',referencia:'',lote:'',cantidad:'',unidad:'',ubicacion:'',notas:''});
    setQrData('');setEncError('');
    if(qrContainerRef.current) qrContainerRef.current.innerHTML='';
  };

  const formTabs=[
    {id:'location',label:'📦 Ubicación'},
    {id:'product', label:'🏷️ Producto'},
    {id:'url',     label:'🔗 URL'},
    {id:'text',    label:'📝 Texto'},
    {id:'contact', label:'👤 Contacto'},
  ];
  const hasData=!!getRawData();

  return (
    <div className="space-y-4">
      <div className="bg-indigo-900 rounded-xl p-4 flex flex-col sm:flex-row items-start sm:items-center gap-3">
        <div className="flex items-center gap-2 flex-shrink-0">
          <span className="text-indigo-300">🔑</span>
          <span className="text-indigo-200 text-sm font-semibold whitespace-nowrap">Clave de cifrado</span>
        </div>
        <div className="flex-1 w-full">
          <PasswordInput value={password} onChange={e=>setPassword(e.target.value)} placeholder="Mínimo 6 caracteres"/>
          <div className="bg-indigo-800 rounded-lg px-3 py-2 text-xs text-indigo-300 font-mono break-all mt-1">
            Caracteres: {password.length} | Hex: {Array.from(password).map(c=>c.charCodeAt(0).toString(16)).join(' ')}
          </div>
        </div>
        {password && password.length<6 && <span className="text-red-400 text-xs whitespace-nowrap">Mín. 6 caracteres</span>}
      </div>

      <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
        <div className="flex border-b border-gray-100 overflow-x-auto">
          {formTabs.map(({id,label})=>(
            <button key={id} onClick={()=>setActiveTab(id)}
              className={`flex-1 px-2 py-3 text-xs font-medium whitespace-nowrap transition-all ${activeTab===id?'text-indigo-600 border-b-2 border-indigo-600 bg-indigo-50':'text-gray-500 hover:bg-gray-50'}`}>
              {label}
            </button>
          ))}
        </div>

        <div className="p-5">
          <div className="grid lg:grid-cols-2 gap-6">
            <div className="space-y-3">
              {activeTab==='location' && (<>
                <h2 className="text-base font-semibold text-gray-800">📦 Ubicación de Almacén</h2>
                <div className="grid grid-cols-2 gap-3">
                  {[['zona','Zona','Ej: A, B'],['pasillo','Pasillo','Ej: 01'],['estante','Estante','Ej: E1'],['nivel','Nivel','Alto, Bajo']].map(([k,l,p])=>(
                    <div key={k}><label className={lbl}>{l}</label>
                      <input className={inp} placeholder={p} value={locationInfo[k]} onChange={e=>setLocationInfo({...locationInfo,[k]:e.target.value})}/></div>
                  ))}
                </div>
                <div><label className={lbl}>Descripción</label>
                  <textarea className={inp} rows={2} value={locationInfo.descripcion} onChange={e=>setLocationInfo({...locationInfo,descripcion:e.target.value})}/></div>
                {(locationInfo.zona||locationInfo.pasillo) && (
                  <div className="bg-indigo-50 rounded-lg p-3 text-sm font-mono font-bold text-indigo-700">
                    📍 {[locationInfo.zona,locationInfo.pasillo,locationInfo.estante,locationInfo.nivel].filter(Boolean).join(' › ')}
                  </div>
                )}
              </>)}
              {activeTab==='product' && (<>
                <h2 className="text-base font-semibold text-gray-800">🏷️ Ficha de Producto</h2>
                <div className="grid grid-cols-2 gap-3">
                  {[['codigo','Código SKU','SKU-001'],['referencia','Referencia','REF-ABC']].map(([k,l,p])=>(
                    <div key={k}><label className={lbl}>{l}</label>
                      <input className={inp} placeholder={p} value={productInfo[k]} onChange={e=>setProductInfo({...productInfo,[k]:e.target.value})}/></div>
                  ))}
                </div>
                <div><label className={lbl}>Nombre</label>
                  <input className={inp} placeholder="Tornillo M6 x 20mm" value={productInfo.nombre} onChange={e=>setProductInfo({...productInfo,nombre:e.target.value})}/></div>
                <div className="grid grid-cols-3 gap-3">
                  {[['lote','Lote','L2404'],['cantidad','Cantidad','100'],['unidad','Unidad','ud']].map(([k,l,p])=>(
                    <div key={k}><label className={lbl}>{l}</label>
                      <input className={inp} placeholder={p} value={productInfo[k]} onChange={e=>setProductInfo({...productInfo,[k]:e.target.value})}/></div>
                  ))}
                </div>
                <div><label className={lbl}>Ubicación</label>
                  <input className={inp} placeholder="A-01-E2-Alto" value={productInfo.ubicacion} onChange={e=>setProductInfo({...productInfo,ubicacion:e.target.value})}/></div>
                <div><label className={lbl}>Notas</label>
                  <textarea className={inp} rows={2} value={productInfo.notas} onChange={e=>setProductInfo({...productInfo,notas:e.target.value})}/></div>
              </>)}
              {activeTab==='url' && (<>
                <h2 className="text-base font-semibold text-gray-800">🔗 URL</h2>
                <div><label className={lbl}>Dirección Web</label>
                  <input className={inp} type="url" placeholder="ejemplo.com" value={urlInput} onChange={e=>setUrlInput(e.target.value)}/></div>
              </>)}
              {activeTab==='text' && (<>
                <h2 className="text-base font-semibold text-gray-800">📝 Texto Libre</h2>
                <textarea className={inp} rows={5} placeholder="Escribe cualquier texto..." value={textInput} onChange={e=>setTextInput(e.target.value)}/>
              </>)}
              {activeTab==='contact' && (<>
                <h2 className="text-base font-semibold text-gray-800">👤 Contacto</h2>
                <div className="grid grid-cols-2 gap-3">
                  {[['firstName','Nombre','Juan'],['lastName','Apellido','Pérez']].map(([k,l,p])=>(
                    <div key={k}><label className={lbl}>{l}</label>
                      <input className={inp} placeholder={p} value={contactInfo[k]} onChange={e=>setContactInfo({...contactInfo,[k]:e.target.value})}/></div>
                  ))}
                </div>
                {[['phone','Teléfono','tel','+34 600 000 000'],['email','Email','email','juan@empresa.com'],
                  ['organization','Empresa','text','Mi Empresa'],['url','Web','url','https://empresa.com']].map(([k,l,t,p])=>(
                  <div key={k}><label className={lbl}>{l}</label>
                    <input className={inp} type={t} placeholder={p} value={contactInfo[k]} onChange={e=>setContactInfo({...contactInfo,[k]:e.target.value})}/></div>
                ))}
              </>)}
              <button onClick={resetForm} className="w-full px-4 py-2.5 bg-gray-100 text-gray-600 rounded-lg hover:bg-gray-200 text-sm font-medium">
                🗑️ Limpiar campos
              </button>
            </div>

            <div className="flex flex-col items-center gap-4">
              <h2 className="text-base font-semibold text-gray-800 self-start">Vista previa</h2>
              <div className="bg-gray-50 border-2 border-dashed border-gray-200 rounded-2xl p-5 w-full flex flex-col items-center justify-center min-h-60 relative">
                {encrypting && (
                  <div className="absolute inset-0 bg-white/80 flex flex-col items-center justify-center rounded-2xl z-10 gap-2">
                    <div className="w-8 h-8 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"/>
                    <span className="text-xs text-indigo-600 font-medium">Cifrando AES-256-GCM…</span>
                  </div>
                )}
                {(!password||password.length<6) && !qrData && <div className="text-center py-4"><div className="text-5xl mb-2">🔒</div><p className="text-sm text-gray-400">Introduce una clave para generar el QR</p></div>}
                {password.length>=6 && !hasData && !qrData && <div className="text-center py-4"><div className="text-5xl mb-2">📋</div><p className="text-sm text-gray-400">Rellena el formulario</p></div>}
                <div ref={qrContainerRef} className="flex justify-center"/>
                {qrData && !encrypting && <p className="text-xs text-gray-400 mt-2">🔒 AES-256-GCM</p>}
              </div>
              {encError && <div className="w-full bg-red-50 border border-red-200 rounded-lg px-3 py-2 text-sm text-red-600">{encError}</div>}
              {qrData && (
                <div className="flex gap-3 w-full">
                  <button onClick={downloadQR} className="flex-1 flex items-center justify-center gap-2 px-4 py-2.5 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 text-sm font-medium shadow">
                    ⬇️ Descargar
                  </button>
                  <button onClick={copyPayload} className="flex-1 flex items-center justify-center gap-2 px-4 py-2.5 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 text-sm font-medium">
                    {copied ? '✅ Copiado' : '📋 Copiar'}
                  </button>
                </div>
              )}
              {qrData && (
                <div className="w-full">
                  <p className="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1">Payload cifrado</p>
                  <div className="bg-gray-900 rounded-lg p-3 text-xs text-green-400 max-h-16 overflow-y-auto font-mono break-all">{qrData}</div>
                </div>
              )}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [mainTab, setMainTab] = useState('generate');
  return (
    <div className="min-h-screen bg-gray-50 p-4">
      <div className="max-w-4xl mx-auto space-y-4">
        <div className="text-center">
          <div className="inline-flex items-center justify-center w-14 h-14 bg-indigo-600 rounded-2xl mb-2 shadow-lg text-3xl">📦</div>
          <h1 className="text-3xl font-bold text-gray-900">QR Almacén Seguro</h1>
          <div className="inline-flex items-center gap-1.5 bg-green-100 text-green-700 text-xs font-semibold px-3 py-1 rounded-full mt-1">
            🔒 AES-256-GCM · PBKDF2 · 310 000 iteraciones
          </div>
        </div>
        <div className="flex rounded-2xl overflow-hidden border border-gray-200 bg-white shadow-sm">
          <button onClick={()=>setMainTab('generate')}
            className={`flex-1 flex items-center justify-center gap-2 py-4 text-sm font-semibold transition-all ${mainTab==='generate'?'bg-indigo-600 text-white':'text-gray-500 hover:bg-gray-50'}`}>
            📱 Generar QR
          </button>
          <button onClick={()=>setMainTab('read')}
            className={`flex-1 flex items-center justify-center gap-2 py-4 text-sm font-semibold transition-all ${mainTab==='read'?'bg-indigo-600 text-white':'text-gray-500 hover:bg-gray-50'}`}>
            🔍 Leer QR
          </button>
        </div>
        {mainTab==='generate' && <GeneratorTab/>}
        {mainTab==='read' && <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5"><ReaderTab/></div>}
        <p className="text-center text-xs text-gray-400 pb-2">Cifrado en el navegador · Sin transmisión de datos · Web Crypto API</p>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js')

            .catch(err => console.warn('SW error:', err));
        });
      }
    </script>
  </body>
</html>
