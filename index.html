<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="QR Almacén" />
    <title>QR Almacén</title>
    <link rel="manifest" href="manifest.json" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; background: #f9fafb; font-family: sans-serif; }
      html, body { overscroll-behavior: none; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">

const { useState, useEffect, useRef, useCallback } = React;

const inp = "w-full px-3 py-2.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent text-sm bg-white";
const lbl = "block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1";

// ── GENERADOR ─────────────────────────────────────────────────────────────────
function GeneratorTab() {
  const [activeTab, setActiveTab] = useState('location');
  const [qrData, setQrData]       = useState('');
  const [copied, setCopied]       = useState(false);
  const qrRef = useRef(null);

  const [urlInput, setUrlInput]         = useState('');
  const [textInput, setTextInput]       = useState('');
  const [locationInfo, setLocationInfo] = useState({ zona:'', pasillo:'', estante:'', nivel:'', descripcion:'' });
  const [productInfo, setProductInfo]   = useState({ codigo:'', nombre:'', referencia:'', lote:'', cantidad:'', unidad:'', ubicacion:'', notas:'' });
  const [contactInfo, setContactInfo]   = useState({ firstName:'', lastName:'', phone:'', email:'', organization:'', url:'' });

  const getRawData = () => {
    if (activeTab === 'url') {
      const u = urlInput.trim();
      return u ? (!u.startsWith('http') ? 'https://'+u : u) : '';
    }
    if (activeTab === 'text') return textInput;
    if (activeTab === 'location') {
      const l = locationInfo;
      if (!l.zona && !l.pasillo && !l.estante) return '';
      const lines = ['=== UBICACIÓN DE ALMACÉN ==='];
      if (l.zona) lines.push('ZONA: '+l.zona);
      if (l.pasillo) lines.push('PASILLO: '+l.pasillo);
      if (l.estante) lines.push('ESTANTE: '+l.estante);
      if (l.nivel) lines.push('NIVEL: '+l.nivel);
      if (l.descripcion) lines.push('DESCRIPCIÓN: '+l.descripcion);
      lines.push('ID: '+[l.zona,l.pasillo,l.estante,l.nivel].filter(Boolean).join('-'));
      return lines.join('\n');
    }
    if (activeTab === 'product') {
      const p = productInfo;
      if (!p.codigo && !p.nombre) return '';
      const lines = ['=== FICHA DE PRODUCTO ==='];
      if (p.codigo) lines.push('CÓDIGO: '+p.codigo);
      if (p.nombre) lines.push('NOMBRE: '+p.nombre);
      if (p.referencia) lines.push('REFERENCIA: '+p.referencia);
      if (p.lote) lines.push('LOTE: '+p.lote);
      if (p.cantidad) lines.push('CANTIDAD: '+p.cantidad+(p.unidad?' '+p.unidad:''));
      if (p.ubicacion) lines.push('UBICACIÓN: '+p.ubicacion);
      if (p.notas) lines.push('NOTAS: '+p.notas);
      return lines.join('\n');
    }
    if (activeTab === 'contact') {
      const c = contactInfo;
      if (!c.firstName && !c.email) return '';
      return `BEGIN:VCARD\nVERSION:3.0\nFN:${c.firstName} ${c.lastName}\nTEL:${c.phone}\nEMAIL:${c.email}\nORG:${c.organization}\nURL:${c.url}\nEND:VCARD`;
    }
    return '';
  };

  useEffect(() => {
    const data = getRawData();
    setQrData(data);
    if (!qrRef.current) return;
    if (!data) { qrRef.current.innerHTML = ''; return; }
    qrRef.current.innerHTML = '';
    const canvas = document.createElement('canvas');
    qrRef.current.appendChild(canvas);
    new window.QRious({ element: canvas, value: data, size: 260, background: 'white', foreground: '#1e1b4b', level: 'M' });
    canvas.style.cssText = 'max-width:260px;width:100%;height:auto;border-radius:8px;';
  }, [activeTab, urlInput, textInput, locationInfo, productInfo, contactInfo]);

  const download = () => {
    const canvas = qrRef.current?.querySelector('canvas');
    if (!canvas) return;
    const a = document.createElement('a');
    a.download = `qr-${activeTab}-${Date.now()}.png`;
    a.href = canvas.toDataURL(); a.click();
  };

  const copy = async () => {
    if (!qrData) return;
    await navigator.clipboard.writeText(qrData);
    setCopied(true); setTimeout(() => setCopied(false), 2000);
  };

  const reset = () => {
    setUrlInput(''); setTextInput('');
    setLocationInfo({ zona:'', pasillo:'', estante:'', nivel:'', descripcion:'' });
    setProductInfo({ codigo:'', nombre:'', referencia:'', lote:'', cantidad:'', unidad:'', ubicacion:'', notas:'' });
    setContactInfo({ firstName:'', lastName:'', phone:'', email:'', organization:'', url:'' });
    setQrData('');
    if (qrRef.current) qrRef.current.innerHTML = '';
  };

  const tabs = [
    { id:'location', label:'📦 Ubicación' },
    { id:'product',  label:'🏷️ Producto' },
    { id:'url',      label:'🔗 URL' },
    { id:'text',     label:'📝 Texto' },
    { id:'contact',  label:'👤 Contacto' },
  ];

  return (
    <div className="space-y-4">
      <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
        <div className="flex border-b border-gray-100 overflow-x-auto">
          {tabs.map(({id,label}) => (
            <button key={id} onClick={() => setActiveTab(id)}
              className={`flex-1 px-2 py-3 text-xs font-medium whitespace-nowrap transition-all ${activeTab===id?'text-indigo-600 border-b-2 border-indigo-600 bg-indigo-50':'text-gray-500 hover:bg-gray-50'}`}>
              {label}
            </button>
          ))}
        </div>
        <div className="p-5">
          <div className="grid lg:grid-cols-2 gap-6">

            {/* FORMULARIO */}
            <div className="space-y-3">
              {activeTab==='location' && (<>
                <h2 className="font-semibold text-gray-800">📦 Ubicación de Almacén</h2>
                <div className="grid grid-cols-2 gap-3">
                  {[['zona','Zona','Ej: A'],['pasillo','Pasillo','Ej: 01'],['estante','Estante','Ej: E1'],['nivel','Nivel','Alto/Bajo']].map(([k,l,p])=>(
                    <div key={k}><label className={lbl}>{l}</label>
                      <input className={inp} placeholder={p} value={locationInfo[k]}
                        onChange={e=>setLocationInfo({...locationInfo,[k]:e.target.value})}/></div>
                  ))}
                </div>
                <div><label className={lbl}>Descripción</label>
                  <textarea className={inp} rows={2} value={locationInfo.descripcion}
                    onChange={e=>setLocationInfo({...locationInfo,descripcion:e.target.value})}/></div>
                {(locationInfo.zona||locationInfo.pasillo) && (
                  <div className="bg-indigo-50 rounded-lg p-3 text-sm font-mono font-bold text-indigo-700">
                    📍 {[locationInfo.zona,locationInfo.pasillo,locationInfo.estante,locationInfo.nivel].filter(Boolean).join(' › ')}
                  </div>
                )}
              </>)}

              {activeTab==='product' && (<>
                <h2 className="font-semibold text-gray-800">🏷️ Ficha de Producto</h2>
                <div className="grid grid-cols-2 gap-3">
                  {[['codigo','Código SKU','SKU-001'],['referencia','Referencia','REF-ABC']].map(([k,l,p])=>(
                    <div key={k}><label className={lbl}>{l}</label>
                      <input className={inp} placeholder={p} value={productInfo[k]}
                        onChange={e=>setProductInfo({...productInfo,[k]:e.target.value})}/></div>
                  ))}
                </div>
                <div><label className={lbl}>Nombre</label>
                  <input className={inp} placeholder="Nombre del producto" value={productInfo.nombre}
                    onChange={e=>setProductInfo({...productInfo,nombre:e.target.value})}/></div>
                <div className="grid grid-cols-3 gap-3">
                  {[['lote','Lote','L2404'],['cantidad','Cantidad','100'],['unidad','Unidad','ud']].map(([k,l,p])=>(
                    <div key={k}><label className={lbl}>{l}</label>
                      <input className={inp} placeholder={p} value={productInfo[k]}
                        onChange={e=>setProductInfo({...productInfo,[k]:e.target.value})}/></div>
                  ))}
                </div>
                <div><label className={lbl}>Ubicación</label>
                  <input className={inp} placeholder="A-01-E2-Alto" value={productInfo.ubicacion}
                    onChange={e=>setProductInfo({...productInfo,ubicacion:e.target.value})}/></div>
                <div><label className={lbl}>Notas</label>
                  <textarea className={inp} rows={2} value={productInfo.notas}
                    onChange={e=>setProductInfo({...productInfo,notas:e.target.value})}/></div>
              </>)}

              {activeTab==='url' && (<>
                <h2 className="font-semibold text-gray-800">🔗 URL</h2>
                <input className={inp} type="url" placeholder="ejemplo.com" value={urlInput}
                  onChange={e=>setUrlInput(e.target.value)}/>
                <p className="text-xs text-gray-400">Se añadirá https:// automáticamente.</p>
              </>)}

              {activeTab==='text' && (<>
                <h2 className="font-semibold text-gray-800">📝 Texto Libre</h2>
                <textarea className={inp} rows={5} placeholder="Escribe cualquier texto..."
                  value={textInput} onChange={e=>setTextInput(e.target.value)}/>
              </>)}

              {activeTab==='contact' && (<>
                <h2 className="font-semibold text-gray-800">👤 Contacto</h2>
                <div className="grid grid-cols-2 gap-3">
                  {[['firstName','Nombre','Juan'],['lastName','Apellido','Pérez']].map(([k,l,p])=>(
                    <div key={k}><label className={lbl}>{l}</label>
                      <input className={inp} placeholder={p} value={contactInfo[k]}
                        onChange={e=>setContactInfo({...contactInfo,[k]:e.target.value})}/></div>
                  ))}
                </div>
                {[['phone','Teléfono','tel','+34 600 000 000'],['email','Email','email','juan@empresa.com'],
                  ['organization','Empresa','text','Mi Empresa'],['url','Web','url','https://empresa.com']].map(([k,l,t,p])=>(
                  <div key={k}><label className={lbl}>{l}</label>
                    <input className={inp} type={t} placeholder={p} value={contactInfo[k]}
                      onChange={e=>setContactInfo({...contactInfo,[k]:e.target.value})}/></div>
                ))}
              </>)}

              <button onClick={reset} className="w-full py-2.5 bg-gray-100 text-gray-600 rounded-lg hover:bg-gray-200 text-sm font-medium">
                🗑️ Limpiar campos
              </button>
            </div>

            {/* PREVIEW QR */}
            <div className="flex flex-col items-center gap-4">
              <h2 className="font-semibold text-gray-800 self-start">Vista previa QR</h2>
              <div className="bg-gray-50 border-2 border-dashed border-gray-200 rounded-2xl p-5 w-full flex flex-col items-center justify-center min-h-56">
                {!qrData && <div className="text-center"><div className="text-5xl mb-2">📱</div><p className="text-sm text-gray-400">Rellena el formulario</p></div>}
                <div ref={qrRef} className="flex justify-center"/>
              </div>
              {qrData && (
                <div className="flex gap-3 w-full">
                  <button onClick={download} className="flex-1 py-2.5 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 text-sm font-medium">
                    ⬇️ Descargar
                  </button>
                  <button onClick={copy} className="flex-1 py-2.5 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 text-sm font-medium">
                    {copied ? '✅ Copiado' : '📋 Copiar texto'}
                  </button>
                </div>
              )}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── LECTOR ────────────────────────────────────────────────────────────────────
function ReaderTab() {
  const [mode, setMode]       = useState('camera');
  const [result, setResult]   = useState('');
  const [error, setError]     = useState('');
  const [scanning, setScanning] = useState(false);
  const [cameraErr, setCameraErr] = useState('');
  const [payloadText, setPayloadText] = useState('');
  const [imgSrc, setImgSrc]   = useState('');

  const videoRef  = useRef(null);
  const canvasRef = useRef(null);
  const streamRef = useRef(null);
  const rafRef    = useRef(null);

  const stopCamera = useCallback(() => {
    cancelAnimationFrame(rafRef.current);
    if (streamRef.current) { streamRef.current.getTracks().forEach(t => t.stop()); streamRef.current = null; }
    setScanning(false);
  }, []);

  useEffect(() => () => stopCamera(), [stopCamera]);

  const handleResult = (text) => { setError(''); setResult(text); };

  // CÁMARA
  const startCamera = async () => {
    setCameraErr(''); setResult(''); setError('');
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: 'environment' } }
      });
      streamRef.current = stream;
      const video = videoRef.current;
      video.srcObject = stream;
      video.setAttribute('playsinline', '');
      video.setAttribute('muted', '');
      video.muted = true;
      await video.play();
      setScanning(true);
      const tick = () => {
        if (!streamRef.current) return;
        if (video.readyState >= 2) {
          const canvas = canvasRef.current;
          canvas.width = video.videoWidth || 640;
          canvas.height = video.videoHeight || 480;
          canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
          const d = canvas.getContext('2d').getImageData(0, 0, canvas.width, canvas.height);
          const code = window.jsQR(d.data, d.width, d.height, { inversionAttempts: 'attemptBoth' });
          if (code?.data) { stopCamera(); handleResult(code.data); return; }
        }
        rafRef.current = requestAnimationFrame(tick);
      };
      rafRef.current = requestAnimationFrame(tick);
    } catch(e) {
      setCameraErr('Error de cámara: ' + e.message);
    }
  };

  // IMAGEN
  const handleFile = (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    setResult(''); setError(''); setImgSrc('');
    const reader = new FileReader();
    reader.onload = (ev) => {
      const src = ev.target.result;
      setImgSrc(src);
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = img.naturalWidth;
        canvas.height = img.naturalHeight;
        canvas.getContext('2d').drawImage(img, 0, 0);
        const d = canvas.getContext('2d').getImageData(0, 0, canvas.width, canvas.height);
        const code = window.jsQR(d.data, d.width, d.height, { inversionAttempts: 'attemptBoth' });
        if (code?.data) handleResult(code.data);
        else setError('No se detectó QR. Prueba con una imagen más nítida.');
      };
      img.src = src;
    };
    reader.readAsDataURL(file);
    // reset input para permitir seleccionar el mismo archivo
    e.target.value = '';
  };

  // PAYLOAD
  const handlePayload = () => {
    const t = payloadText.trim();
    if (!t) { setError('Pega un texto primero.'); return; }
    handleResult(t);
  };

  const switchMode = (m) => { stopCamera(); setMode(m); setResult(''); setError(''); setCameraErr(''); setImgSrc(''); };

  return (
    <div className="space-y-4">
      <div className="flex rounded-xl overflow-hidden border border-gray-200">
        {[['camera','📷 Cámara'],['image','🖼️ Imagen'],['payload','📋 Texto']].map(([id,label])=>(
          <button key={id} onClick={()=>switchMode(id)}
            className={`flex-1 py-3 text-sm font-medium transition-all ${mode===id?'bg-indigo-600 text-white':'bg-gray-50 text-gray-500 hover:text-gray-700'}`}>
            {label}
          </button>
        ))}
      </div>

      {/* CÁMARA */}
      {mode==='camera' && (
        <div className="space-y-3">
          <div className="relative bg-black rounded-xl overflow-hidden" style={{minHeight:'250px'}}>
            <video ref={videoRef} playsInline muted autoPlay
              style={{width:'100%', minHeight:'250px', objectFit:'cover', display:'block'}}/>
            <canvas ref={canvasRef} style={{display:'none'}}/>
            {!scanning && (
              <div className="absolute inset-0 flex flex-col items-center justify-center">
                <div className="text-5xl mb-2">📷</div>
                <p className="text-white/60 text-sm">Pulsa para activar la cámara</p>
              </div>
            )}
            {scanning && (
              <div className="absolute inset-0 flex items-center justify-center pointer-events-none">
                <div style={{width:'200px',height:'200px',position:'relative'}}>
                  <div style={{position:'absolute',top:0,left:0,width:'30px',height:'30px',borderTop:'4px solid #818cf8',borderLeft:'4px solid #818cf8',borderRadius:'4px 0 0 0'}}/>
                  <div style={{position:'absolute',top:0,right:0,width:'30px',height:'30px',borderTop:'4px solid #818cf8',borderRight:'4px solid #818cf8',borderRadius:'0 4px 0 0'}}/>
                  <div style={{position:'absolute',bottom:0,left:0,width:'30px',height:'30px',borderBottom:'4px solid #818cf8',borderLeft:'4px solid #818cf8',borderRadius:'0 0 0 4px'}}/>
                  <div style={{position:'absolute',bottom:0,right:0,width:'30px',height:'30px',borderBottom:'4px solid #818cf8',borderRight:'4px solid #818cf8',borderRadius:'0 0 4px 0'}}/>
                </div>
              </div>
            )}
          </div>
          {cameraErr && <div className="bg-red-50 border border-red-200 rounded-lg p-3 text-sm text-red-600">{cameraErr}</div>}
          {!scanning
            ? <button onClick={startCamera} className="w-full py-3 bg-indigo-600 text-white rounded-lg text-sm font-medium">📷 Iniciar cámara</button>
            : <button onClick={stopCamera}  className="w-full py-3 bg-red-500 text-white rounded-lg text-sm font-medium">✕ Detener</button>
          }
        </div>
      )}

      {/* IMAGEN */}
      {mode==='image' && (
        <div className="space-y-3">
          <div className="bg-gray-50 border-2 border-dashed border-gray-300 rounded-xl p-6 text-center">
            <div className="text-4xl mb-2">🖼️</div>
            <p className="text-sm text-gray-500 mb-3">Selecciona una imagen con código QR</p>
            <input
              type="file"
              accept="image/*"
              onChange={handleFile}
              style={{fontSize:'16px', display:'block', margin:'0 auto'}}
            />
          </div>
          {imgSrc && (
            <div className="rounded-xl overflow-hidden border border-gray-200 bg-white p-2">
              <img src={imgSrc} alt="Imagen cargada" style={{width:'100%', maxHeight:'200px', objectFit:'contain'}}/>
            </div>
          )}
        </div>
      )}

      {/* PAYLOAD / TEXTO */}
      {mode==='payload' && (
        <div className="space-y-3">
          <label className={lbl}>Pega aquí el texto del QR</label>
          <textarea className={inp} rows={5} placeholder="Pega aquí el contenido..."
            value={payloadText} onChange={e=>setPayloadText(e.target.value)}/>
          <button onClick={handlePayload} disabled={!payloadText}
            className="w-full py-3 bg-indigo-600 text-white rounded-lg disabled:opacity-40 text-sm font-medium">
            ✅ Ver contenido
          </button>
        </div>
      )}

      {/* ERROR */}
      {error && <div className="bg-red-50 border border-red-200 rounded-xl p-3 text-sm text-red-600">⚠️ {error}</div>}

      {/* RESULTADO */}
      {result && (
        <div className="bg-green-50 border border-green-200 rounded-xl p-4 space-y-2">
          <p className="text-sm font-semibold text-green-700">✅ QR leído correctamente</p>
          <pre className="text-sm text-gray-700 whitespace-pre-wrap break-words font-mono bg-white rounded-lg p-3 border border-green-100 max-h-60 overflow-y-auto">{result}</pre>
          <button onClick={()=>navigator.clipboard.writeText(result)}
            className="text-sm text-green-700 underline">📋 Copiar</button>
        </div>
      )}
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState('generate');
  return (
    <div className="min-h-screen bg-gray-50 p-4">
      <div className="max-w-4xl mx-auto space-y-4">
        <div className="text-center pt-2">
          <div className="inline-flex items-center justify-center w-14 h-14 bg-indigo-600 rounded-2xl mb-2 shadow-lg text-3xl">📦</div>
          <h1 className="text-2xl font-bold text-gray-900">QR Almacén</h1>
          <p className="text-xs text-gray-400 mt-1">Fase 1 — Sin cifrado</p>
        </div>

        <div className="flex rounded-2xl overflow-hidden border border-gray-200 bg-white shadow-sm">
          <button onClick={()=>setTab('generate')}
            className={`flex-1 py-4 text-sm font-semibold transition-all ${tab==='generate'?'bg-indigo-600 text-white':'text-gray-500 hover:bg-gray-50'}`}>
            📱 Generar QR
          </button>
          <button onClick={()=>setTab('read')}
            className={`flex-1 py-4 text-sm font-semibold transition-all ${tab==='read'?'bg-indigo-600 text-white':'text-gray-500 hover:bg-gray-50'}`}>
            🔍 Leer QR
          </button>
        </div>

        {tab==='generate' && <GeneratorTab/>}
        {tab==='read'     && <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5"><ReaderTab/></div>}

        <p className="text-center text-xs text-gray-400 pb-4">Fase 1 — Prueba sin cifrado</p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

    </script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
